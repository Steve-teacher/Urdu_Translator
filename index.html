<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>اردو ترجمہ قاری | Urdu Document Reader</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;700&family=Amiri:ital,wght@0,400;0,700;1,400&family=Barlow:wght@300;400;600&display=swap" rel="stylesheet" />
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  :root {
    --ink: #1a1008;
    --parchment: #fdf6e3;
    --gold: #c9922a;
    --gold-light: #e8b84b;
    --rust: #8b3a2a;
    --teal: #1a5f6e;
    --teal-light: #2a8fa3;
    --paper: #f5ead0;
    --shadow: rgba(26,16,8,0.18);
    --border: #d4a853;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--ink);
    min-height: 100vh;
    font-family: 'Barlow', sans-serif;
    color: var(--parchment);
    overflow-x: hidden;
  }

  /* Geometric background pattern */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      repeating-linear-gradient(45deg, transparent, transparent 40px, rgba(201,146,42,0.03) 40px, rgba(201,146,42,0.03) 41px),
      repeating-linear-gradient(-45deg, transparent, transparent 40px, rgba(201,146,42,0.03) 40px, rgba(201,146,42,0.03) 41px);
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    max-width: 860px;
    margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
  }

  /* Header */
  header {
    text-align: center;
    padding: 2.5rem 0 2rem;
  }

  .logo-ornament {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    margin-bottom: 0.75rem;
  }

  .ornament-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--gold), transparent);
  }

  .ornament-diamond {
    width: 10px;
    height: 10px;
    background: var(--gold);
    transform: rotate(45deg);
    flex-shrink: 0;
  }

  h1 {
    font-family: 'Noto Nastaliq Urdu', serif;
    font-size: clamp(2rem, 6vw, 3.2rem);
    color: var(--gold-light);
    text-shadow: 0 2px 12px rgba(201,146,42,0.3);
    line-height: 1.5;
    letter-spacing: 0.02em;
    direction: rtl;
  }

  .subtitle {
    font-family: 'Barlow', sans-serif;
    font-size: 0.85rem;
    color: rgba(253,246,227,0.5);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-top: 0.4rem;
    direction: ltr;
  }

  /* Upload Zone */
  .upload-section {
    margin: 2rem 0;
  }

  .upload-zone {
    border: 2px dashed var(--border);
    border-radius: 4px;
    padding: 3rem 2rem;
    text-align: center;
    cursor: pointer;
    background: rgba(253,246,227,0.03);
    transition: all 0.3s ease;
    position: relative;
    direction: ltr;
    -webkit-tap-highlight-color: rgba(201,146,42,0.2);
  }

  .upload-zone:hover, .upload-zone.drag-over {
    border-color: var(--gold-light);
    background: rgba(253,246,227,0.07);
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(201,146,42,0.12);
  }

  .upload-icon {
    font-size: 2.8rem;
    margin-bottom: 0.75rem;
    display: block;
  }

  .upload-text {
    font-size: 1rem;
    color: rgba(253,246,227,0.75);
    margin-bottom: 0.4rem;
  }

  .upload-hint {
    font-size: 0.78rem;
    color: rgba(253,246,227,0.35);
    letter-spacing: 0.08em;
  }

  /* Style the file input itself as a visible button — only reliable iOS approach */
  #fileInput {
    display: block;
    margin: 1.2rem auto 0;
    padding: 0.75rem 2rem;
    background: linear-gradient(135deg, #c9922a, #e8b84b);
    color: #1a1008;
    border: none;
    border-radius: 3px;
    font-size: 0.95rem;
    font-weight: 700;
    font-family: 'Barlow', sans-serif;
    letter-spacing: 0.08em;
    cursor: pointer;
    -webkit-appearance: none;
    width: auto;
  }

  .file-badge {
    display: none;
    align-items: center;
    gap: 0.6rem;
    background: rgba(201,146,42,0.15);
    border: 1px solid var(--gold);
    border-radius: 3px;
    padding: 0.6rem 1rem;
    font-size: 0.85rem;
    margin-top: 1rem;
    direction: ltr;
    color: var(--gold-light);
  }

  .file-badge.visible { display: flex; }

  /* Translate Button */
  .action-bar {
    display: flex;
    gap: 1rem;
    margin: 1.5rem 0;
    direction: ltr;
  }

  .btn {
    font-family: 'Barlow', sans-serif;
    font-size: 0.88rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    border: none;
    border-radius: 3px;
    cursor: pointer;
    padding: 0.75rem 1.8rem;
    transition: all 0.25s ease;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }

  .btn-primary {
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    color: var(--ink);
    box-shadow: 0 4px 15px rgba(201,146,42,0.3);
    flex: 1;
  }

  .btn-primary:not(:disabled):hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(201,146,42,0.45);
  }

  .btn-teal {
    background: var(--teal);
    color: var(--parchment);
    border: 1px solid var(--teal-light);
  }

  .btn-teal:not(:disabled):hover {
    background: var(--teal-light);
    transform: translateY(-2px);
  }

  .btn-rust {
    background: var(--rust);
    color: var(--parchment);
    border: 1px solid #c05040;
  }

  .btn-rust:not(:disabled):hover {
    background: #a04535;
    transform: translateY(-2px);
  }

  /* Progress */
  .progress-bar-wrap {
    display: none;
    background: rgba(253,246,227,0.08);
    border-radius: 2px;
    height: 4px;
    margin: 1rem 0;
    overflow: hidden;
  }

  .progress-bar-wrap.visible { display: block; }

  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--gold-light));
    width: 0%;
    transition: width 0.4s ease;
    border-radius: 2px;
  }

  .status-msg {
    font-size: 0.82rem;
    color: var(--gold);
    letter-spacing: 0.1em;
    text-align: center;
    min-height: 1.2em;
    direction: ltr;
  }

  /* Output panel */
  .output-panel {
    display: none;
    background: var(--parchment);
    border-radius: 4px;
    overflow: hidden;
    box-shadow: 0 12px 50px rgba(0,0,0,0.5);
    margin-top: 2rem;
  }

  .output-panel.visible { display: block; }

  .panel-header {
    background: var(--ink);
    border-bottom: 2px solid var(--gold);
    padding: 0.8rem 1.2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    direction: ltr;
  }

  .panel-title {
    font-family: 'Noto Nastaliq Urdu', serif;
    color: var(--gold-light);
    font-size: 1.05rem;
    direction: rtl;
  }

  .audio-controls {
    display: flex;
    align-items: center;
    gap: 0.6rem;
  }

  .speed-label {
    font-size: 0.75rem;
    color: rgba(253,246,227,0.5);
    letter-spacing: 0.1em;
  }

  .speed-select {
    background: rgba(253,246,227,0.1);
    border: 1px solid var(--border);
    color: var(--parchment);
    border-radius: 3px;
    padding: 0.3rem 0.5rem;
    font-size: 0.8rem;
    cursor: pointer;
  }

  .text-body {
    padding: 2rem 2.5rem;
    color: var(--ink);
    direction: rtl;
  }

  .urdu-text {
    font-family: 'Noto Nastaliq Urdu', serif;
    font-size: 1.4rem;
    line-height: 2.4;
    color: var(--ink);
    direction: rtl;
    text-align: right;
  }

  /* Speaking highlight */
  .speaking .urdu-text { background: rgba(201,146,42,0.08); border-radius: 4px; }
  .highlight-word { background: rgba(201,146,42,0.35); border-radius: 2px; padding: 0 2px; }

  /* Word count */
  .meta-bar {
    display: flex;
    justify-content: flex-start;
    gap: 1.5rem;
    padding: 0.7rem 2.5rem;
    background: rgba(26,16,8,0.06);
    border-top: 1px solid rgba(26,16,8,0.1);
    direction: ltr;
  }

  .meta-item {
    font-size: 0.75rem;
    color: rgba(26,16,8,0.45);
    letter-spacing: 0.08em;
  }

  /* Speaking indicator */
  .speaking-badge {
    display: none;
    align-items: center;
    gap: 0.5rem;
    background: rgba(26,144,109,0.15);
    border: 1px solid #26906d;
    color: #26906d;
    padding: 0.4rem 0.9rem;
    border-radius: 3px;
    font-size: 0.78rem;
    letter-spacing: 0.08em;
    direction: ltr;
  }

  .speaking-badge.visible { display: flex; }

  .pulse-dot {
    width: 8px;
    height: 8px;
    background: #26906d;
    border-radius: 50%;
    animation: pulse 1.1s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.7); }
  }

  /* Error */
  .error-box {
    display: none;
    background: rgba(139,58,42,0.15);
    border: 1px solid var(--rust);
    color: #e07060;
    padding: 0.9rem 1.2rem;
    border-radius: 3px;
    font-size: 0.85rem;
    margin: 1rem 0;
    direction: ltr;
  }

  .error-box.visible { display: block; }

  footer {
    text-align: center;
    margin-top: 3rem;
    font-size: 0.72rem;
    color: rgba(253,246,227,0.2);
    letter-spacing: 0.1em;
    direction: ltr;
  }
</style>
</head>
<body>
<div class="wrapper">
  <header>
    <div class="logo-ornament">
      <div class="ornament-line"></div>
      <div class="ornament-diamond"></div>
      <div class="ornament-line"></div>
    </div>
    <h1>اردو ترجمہ قاری</h1>
    <p class="subtitle">Urdu Document Translator &amp; Reader</p>
    <div class="logo-ornament" style="margin-top:0.75rem">
      <div class="ornament-line"></div>
      <div class="ornament-diamond"></div>
      <div class="ornament-line"></div>
    </div>
  </header>

  <div class="upload-section">
    <div class="upload-zone" id="dropZone">
      <span class="upload-icon">📄</span>
      <p class="upload-text">Choose a file to translate</p>
      <p class="upload-hint">Supports TXT, PDF, DOCX, MD &nbsp;·&nbsp; Files app, iCloud, Google Drive all work</p>
      <input type="file" id="fileInput" accept=".txt,.md,.pdf,.docx,.doc,.rtf,.csv" />
    </div>
    <div class="file-badge" id="fileBadge">
      <span>📎</span>
      <span id="fileName">—</span>
    </div>
  </div>

  <div class="action-bar">
    <button class="btn btn-primary" id="translateBtn" disabled>
      <span>✦</span> Translate to Urdu
    </button>
  </div>

  <div class="progress-bar-wrap" id="progressWrap">
    <div class="progress-bar" id="progressBar"></div>
  </div>
  <p class="status-msg" id="statusMsg"></p>
  <div class="error-box" id="errorBox"></div>

  <div class="output-panel" id="outputPanel">
    <div class="panel-header">
      <span class="panel-title">ترجمہ شدہ متن</span>
      <div class="audio-controls">
        <span class="speed-label">SPEED</span>
        <select class="speed-select" id="rateSelect">
          <option value="0.7">0.7×</option>
          <option value="0.85" selected>0.85×</option>
          <option value="1.0">1.0×</option>
          <option value="1.2">1.2×</option>
        </select>
        <div class="speaking-badge" id="speakingBadge">
          <div class="pulse-dot"></div> <span>Speaking…</span>
        </div>
        <button class="btn btn-teal" id="speakBtn" style="padding:0.55rem 1rem;">
          🔊 Read Aloud
        </button>
        <button class="btn btn-rust" id="stopBtn" style="padding:0.55rem 1rem;" disabled>
          ■ Stop
        </button>
      </div>
    </div>
    <div class="text-body" id="textBody">
      <div class="urdu-text" id="urduText"></div>
    </div>
    <div class="meta-bar">
      <span class="meta-item" id="wordCount">—</span>
      <span class="meta-item" id="charCount">—</span>
    </div>
  </div>

  <footer>Powered by Claude AI · Web Speech API · اردو</footer>
</div>

<script>
// Wait for pdf.js worker to be configured after library loads
try {
  if (window.pdfjsLib) {
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  }
} catch(e) {}

// ── DOM refs ───────────────────────────────────────────────────
var dropZone     = document.getElementById('dropZone');
var fileInput    = document.getElementById('fileInput');
var fileBadge    = document.getElementById('fileBadge');
var fileNameEl   = document.getElementById('fileName');
var translateBtn = document.getElementById('translateBtn');
var progressWrap = document.getElementById('progressWrap');
var progressBar  = document.getElementById('progressBar');
var statusMsg    = document.getElementById('statusMsg');
var errorBox     = document.getElementById('errorBox');
var outputPanel  = document.getElementById('outputPanel');
var urduText     = document.getElementById('urduText');
var speakBtn     = document.getElementById('speakBtn');
var stopBtn      = document.getElementById('stopBtn');
var rateSelect   = document.getElementById('rateSelect');
var speakingBadge= document.getElementById('speakingBadge');
var speakingSpan = speakingBadge.querySelector('span');
var wordCountEl  = document.getElementById('wordCount');
var charCountEl  = document.getElementById('charCount');

var fileContent  = '';

// ── Helpers ────────────────────────────────────────────────────
function setStatus(msg) { statusMsg.textContent = msg; }
function showError(msg) { errorBox.textContent = msg; errorBox.classList.add('visible'); }
function hideError()    { errorBox.classList.remove('visible'); }

function animateProgress(from, to, duration) {
  var start = performance.now();
  function step(now) {
    var t = Math.min((now - start) / duration, 1);
    progressBar.style.width = (from + (to - from) * t) + '%';
    if (t < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

// ── File upload ────────────────────────────────────────────────
dropZone.addEventListener('dragover', function(e) { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', function() { dropZone.classList.remove('drag-over'); });
dropZone.addEventListener('drop', function(e) {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', function(e) {
  var file = e.target.files[0] || (fileInput.files && fileInput.files[0]);
  if (file) loadFile(file);
});

function loadFile(file) {
  var ext = file.name.split('.').pop().toLowerCase();
  fileNameEl.textContent = file.name;
  fileBadge.classList.add('visible');
  hideError();
  translateBtn.disabled = true;
  fileContent = '';

  if (ext === 'txt' || ext === 'md' || ext === 'csv' || ext === 'rtf') {
    var reader = new FileReader();
    reader.onload = function(e) {
      fileContent = e.target.result;
      translateBtn.disabled = false;
      setStatus('Loaded ' + file.name + ' — ' + fileContent.length.toLocaleString() + ' characters');
    };
    reader.onerror = function() { showError('Could not read file.'); };
    reader.readAsText(file);

  } else if (ext === 'pdf') {
    setStatus('Extracting text from PDF…');
    extractPdfText(file);

  } else if (ext === 'docx' || ext === 'doc') {
    setStatus('Extracting text from DOCX…');
    extractDocxText(file);

  } else {
    showError('Unsupported file type. Please use TXT, MD, PDF, or DOCX.');
  }
}

// ── PDF extraction ─────────────────────────────────────────────
function extractPdfText(file) {
  if (!window.pdfjsLib) {
    showError('PDF library failed to load. Please refresh and try again.');
    return;
  }
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  var reader = new FileReader();
  reader.onload = function(e) {
    var typedArray = new Uint8Array(e.target.result);
    pdfjsLib.getDocument({ data: typedArray }).promise.then(function(pdf) {
      var pages = pdf.numPages;
      var textParts = [];
      var promises = [];
      for (var i = 1; i <= pages; i++) {
        promises.push(
          pdf.getPage(i).then(function(page) {
            return page.getTextContent().then(function(content) {
              return content.items.map(function(item) { return item.str; }).join(' ');
            });
          })
        );
      }
      Promise.all(promises).then(function(results) {
        fileContent = results.join('\n').trim();
        if (!fileContent) { showError('No text found in PDF. Try a .txt file instead.'); return; }
        translateBtn.disabled = false;
        setStatus('Extracted ' + fileContent.length.toLocaleString() + ' characters from PDF (' + pages + ' pages)');
      });
    }).catch(function(err) {
      showError('PDF read error: ' + err.message);
    });
  };
  reader.readAsArrayBuffer(file);
}

// ── DOCX extraction ────────────────────────────────────────────
function extractDocxText(file) {
  if (!window.JSZip) {
    showError('DOCX library failed to load. Please refresh and try again.');
    return;
  }
  var reader = new FileReader();
  reader.onload = function(e) {
    JSZip.loadAsync(e.target.result).then(function(zip) {
      var xmlFile = zip.file('word/document.xml');
      if (!xmlFile) { showError('Invalid DOCX file.'); return; }
      return xmlFile.async('string');
    }).then(function(xmlText) {
      if (!xmlText) return;
      // Strip XML tags; decode &amp; &lt; etc.
      var raw = xmlText
        .replace(/<w:p[ >]/g, '\n<w:p ')  // paragraph breaks
        .replace(/<[^>]+>/g, '')
        .replace(/&amp;/g, '&').replace(/&lt;/g, '<').replace(/&gt;/g, '>')
        .replace(/&nbsp;/g, ' ').replace(/&#x[0-9A-Fa-f]+;/g, '')
        .replace(/\s{2,}/g, ' ').trim();
      if (!raw) { showError('No text found in DOCX.'); return; }
      fileContent = raw;
      translateBtn.disabled = false;
      setStatus('Extracted ' + fileContent.length.toLocaleString() + ' characters from DOCX');
    }).catch(function(err) {
      showError('DOCX read error: ' + err.message);
    });
  };
  reader.readAsArrayBuffer(file);
}

// ── Translation — full document in 3000-char chunks ────────────
var CHUNK_SIZE = 3000;

function splitIntoChunks(text, size) {
  var chunks = [];
  var i = 0;
  while (i < text.length) {
    var end = Math.min(i + size, text.length);
    if (end < text.length) {
      var nb = text.lastIndexOf('\n', end);
      var sb = Math.max(
        text.lastIndexOf('. ', end),
        text.lastIndexOf('? ', end),
        text.lastIndexOf('! ', end)
      );
      var boundary = Math.max(nb, sb);
      if (boundary > i + size * 0.5) end = boundary + 1;
    }
    var chunk = text.slice(i, end).trim();
    if (chunk) chunks.push(chunk);
    i = end;
  }
  return chunks;
}

function translateChunk(chunk) {
  return fetch('/api/translate', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 4096,
      system: 'You are an expert translator. Translate the given text into natural, fluent Urdu (Nastaliq script). Preserve meaning, tone, and paragraph structure. Output ONLY the Urdu translation — no explanations, no English, no preamble. Write in right-to-left Urdu script.',
      messages: [{ role: 'user', content: 'Translate this text to Urdu:\n\n' + chunk }]
    })
  }).then(function(res) {
    return res.json();
  }).then(function(data) {
    if (data.error) throw new Error(data.error.message);
    var text = '';
    if (data.content) {
      for (var i = 0; i < data.content.length; i++) {
        if (data.content[i].type === 'text') { text = data.content[i].text; break; }
      }
    }
    if (!text) throw new Error('Empty response from API');
    return text.trim();
  });
}

translateBtn.addEventListener('click', function() {
  if (!fileContent) return;
  translateBtn.disabled = true;
  hideError();
  outputPanel.classList.remove('visible');
  progressWrap.classList.add('visible');
  urduText.textContent = '';

  var chunks = splitIntoChunks(fileContent, CHUNK_SIZE);
  var total  = chunks.length;
  setStatus('Translating full document — 0 of ' + total + ' part(s)…');
  animateProgress(0, 5, 300);

  var fullTranslation = '';
  var idx = 0;

  function doNext() {
    if (idx >= chunks.length) {
      // Done
      animateProgress(95, 100, 300);
      setStatus('Translation complete — all ' + total + ' part(s) done');
      setTimeout(function() { progressWrap.classList.remove('visible'); setStatus(''); }, 2000);
      translateBtn.disabled = false;
      var words = fullTranslation.trim().split(/\s+/).length;
      wordCountEl.textContent = words.toLocaleString() + ' words';
      charCountEl.textContent = fullTranslation.length.toLocaleString() + ' characters';
      return;
    }
    setStatus('Translating part ' + (idx + 1) + ' of ' + total + '…');
    var pct = 5 + (idx / total) * 88;
    animateProgress(pct, pct + 88 / total, 800);

    translateChunk(chunks[idx]).then(function(translated) {
      fullTranslation += (fullTranslation ? '\n\n' : '') + translated;
      urduText.textContent = fullTranslation;
      if (idx === 0) {
        outputPanel.classList.add('visible');
        outputPanel.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
      idx++;
      doNext();
    }).catch(function(err) {
      progressWrap.classList.remove('visible');
      showError('Translation failed on part ' + (idx + 1) + ': ' + err.message);
      setStatus('');
      translateBtn.disabled = false;
    });
  }

  doNext();
});

// ── Text-to-Speech — sentence-chunked with keep-alive ──────────
var ttsChunks  = [];
var ttsIndex   = 0;
var ttsRunning = false;
var keepAlive  = null;

function getUrduVoice() {
  var voices = window.speechSynthesis.getVoices();
  for (var i = 0; i < voices.length; i++) {
    if (voices[i].lang === 'ur-PK') return voices[i];
  }
  for (var i = 0; i < voices.length; i++) {
    if (voices[i].lang.indexOf('ur') === 0) return voices[i];
  }
  for (var i = 0; i < voices.length; i++) {
    if (voices[i].lang === 'ar-SA') return voices[i];
  }
  for (var i = 0; i < voices.length; i++) {
    if (voices[i].lang.indexOf('ar') === 0) return voices[i];
  }
  return null;
}

function splitForTTS(text) {
  // Split on sentence-ending punctuation, keeping segments short
  var segments = [];
  var parts = text.split(/(?<=[.!?\u06D4\n])\s*/u);
  for (var i = 0; i < parts.length; i++) {
    var seg = parts[i].trim();
    if (!seg) continue;
    if (seg.length <= 200) {
      segments.push(seg);
    } else {
      // Break long segments by word
      var words = seg.split(' ');
      var cur = '';
      for (var j = 0; j < words.length; j++) {
        var candidate = cur ? cur + ' ' + words[j] : words[j];
        if (candidate.length > 200 && cur) {
          segments.push(cur);
          cur = words[j];
        } else {
          cur = candidate;
        }
      }
      if (cur) segments.push(cur);
    }
  }
  return segments.filter(function(s) { return s.length > 0; });
}

function speakNext() {
  if (!ttsRunning || ttsIndex >= ttsChunks.length) {
    endTTS();
    return;
  }
  var seg   = ttsChunks[ttsIndex];
  var voice = getUrduVoice();
  var utter = new SpeechSynthesisUtterance(seg);
  utter.lang  = 'ur-PK';
  utter.rate  = parseFloat(rateSelect.value);
  utter.pitch = 0.95;
  if (voice) utter.voice = voice;

  var pct = Math.round((ttsIndex / ttsChunks.length) * 100);
  speakingSpan.textContent = 'Speaking — ' + pct + '% (' + (ttsIndex + 1) + '/' + ttsChunks.length + ')';

  utter.onend = function() {
    if (ttsRunning) { ttsIndex++; speakNext(); }
  };
  utter.onerror = function() {
    if (ttsRunning) { ttsIndex++; speakNext(); }
  };

  window.speechSynthesis.speak(utter);
}

function startTTS() {
  var text = urduText.textContent.trim();
  if (!text) return;
  window.speechSynthesis.cancel();
  ttsChunks  = splitForTTS(text);
  ttsIndex   = 0;
  ttsRunning = true;

  speakBtn.disabled = true;
  stopBtn.disabled  = false;
  speakingBadge.classList.add('visible');
  document.getElementById('textBody').classList.add('speaking');

  // Keep-alive to prevent Chrome from pausing TTS in background
  keepAlive = setInterval(function() {
    if (ttsRunning && window.speechSynthesis.paused) {
      window.speechSynthesis.resume();
    }
  }, 8000);

  speakNext();
}

function endTTS() {
  ttsRunning = false;
  window.speechSynthesis.cancel();
  clearInterval(keepAlive);
  speakBtn.disabled = false;
  stopBtn.disabled  = true;
  speakingBadge.classList.remove('visible');
  document.getElementById('textBody').classList.remove('speaking');
}

speakBtn.addEventListener('click', startTTS);
stopBtn.addEventListener('click',  endTTS);

// Preload voices on page load
if (window.speechSynthesis) {
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged = function() { window.speechSynthesis.getVoices(); };
}
</script>
